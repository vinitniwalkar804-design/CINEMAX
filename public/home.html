<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23dc2626'><path d='M7 4v16l13-8L7 4z'/></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMAX - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hero-gradient { background: linear-gradient(135deg, #8e0404 0%, black 100%); }
    </style>
</head>
<body class="min-h-screen bg-gray-950">
    <nav class="bg-black shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-red-600">CINEMAX</h1>
            <div class="flex gap-4">
                <a href="/home" class="text-red-600">Home</a>
                <a href="/profile" class="text-red-600">Profile</a>
                <button id="logout" class="text-red-600">Logout</button>
            </div>
        </div>
    </nav>

    <div class="hero-gradient px-4 py-12 text-center text-white">
        <h1 class="text-6xl font-bold tracking-wider">NOW SHOWING</h1>
        <p class="mt-2">Book your favourite movies at the best seats</p>
    </div>

    <div class="container mx-auto py-8">
        <div id="movies" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 px-4">
            <!-- Movies will be loaded here -->
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        fetch('/api/movies', {
            headers: { 'Authorization': `Bearer ${token}` }
        })
        .then(res => res.json())
        .then(movies => {
            const container = document.getElementById('movies');
            const colors = ['from-red-900 to-orange-800', 'from-blue-900 to-cyan-800', 'from-gray-900 to-gray-700'];
            movies.forEach((movie, i) => {
                const div = document.createElement('div');
                div.className = 'cursor-pointer overflow-hidden rounded-xl border border-gray-700 bg-gray-900 text-white transition-all hover:border-red-500 hover:shadow-2xl hover:scale-105 duration-200';
                div.onclick = () => window.location.href = `/booking/${movie.id}`;
                div.innerHTML = `
                    <div class="w-full overflow-hidden bg-gray-900" style="height:400px">
                        <img src="/api/image-proxy?url=${encodeURIComponent(movie.poster)}" alt="${movie.title}"
                            class="w-full h-full object-cover object-top"
                            onerror="this.parentElement.innerHTML='<div class=\\'flex h-full items-center justify-center bg-gradient-to-br ${colors[i % colors.length]} text-white\\'><span class=\\'text-3xl font-bold px-4 text-center\\'>${movie.title}</span></div>'">
                    </div>
                    <div class="p-4">
                        <h3 class="text-xl font-bold">${movie.title}</h3>
                        <div class="mt-1 flex gap-3 text-xs text-gray-400">
                            <span>${movie.genre}</span>
                            <span>${movie.duration}</span>
                            <span class="text-yellow-400">${movie.rating}</span>
                        </div>
                        <div class="mt-3 flex flex-wrap gap-2">
                            ${movie.showTimes.map(t => `<span class="border border-gray-600 text-gray-300 px-2 py-1 text-xs rounded">${t}</span>`).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        });

        document.getElementById('logout').onclick = () => {
            localStorage.clear();
            window.location.href = '/';
        };
    </script>
</body>
</html>
