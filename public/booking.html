<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23dc2626'><path d='M7 4v16l13-8L7 4z'/></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMAX - Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .seat-available { background-color: #e5e7eb; border: 1px solid #d1d5db; }
        .seat-booked { background-color: #ef4444; border: 1px solid #dc2626; }
        .seat-selected { background-color: #3b82f6; border: 1px solid #2563eb; }
        .seat-silver { border-color: #9ca3af; }
        .seat-gold { border-color: #f59e0b; }
        .seat-platinum { border-color: #8b5cf6; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="bg-black shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-red-600">CINEMAX</h1>
            <div class="flex gap-4">
                <a href="/home" class="text-red-600">Home</a>
                <a href="/profile" class="text-red-600">Profile</a>
                <button id="logout" class="text-red-600">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto py-6">
        <h1 id="movieTitle" class="text-4xl font-bold"></h1>

        <div id="showTimes" class="mt-4 flex flex-wrap gap-2">
            <!-- Show times -->
        </div>

        <div class="mt-6 flex items-center gap-3">
            <input id="ticketCount" type="number" min="1" max="20" value="1" class="w-24 px-3 py-2 border border-gray-300 rounded">
            <button id="autoAllocate" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-blue-700">Auto-Allocate</button>
            <button id="reset" class="border border-gray-300 px-4 py-2 rounded">Reset</button>
        </div>

        <div class="mt-8 mb-6 text-center">
            <div class="mx-auto h-2 w-3/4 rounded-full bg-gray-400"></div>
            <p class="mt-1 text-xs text-gray-600">SCREEN</p>
        </div>

        <div id="seatGrid" class="overflow-x-auto">
            <!-- Seat grid -->
        </div>

        <div class="mt-6 flex flex-wrap justify-center gap-4 text-xs text-gray-600">
            <span class="flex items-center gap-1"><span class="h-4 w-4 rounded seat-available"></span> Available</span>
            <span class="flex items-center gap-1"><span class="h-4 w-4 rounded seat-booked"></span> Booked</span>
            <span class="flex items-center gap-1"><span class="h-4 w-4 rounded seat-selected"></span> Selected</span>
            <span class="flex items-center gap-1"><span class="h-4 w-4 rounded border-2 seat-silver"></span> Silver ₹180</span>
            <span class="flex items-center gap-1"><span class="h-4 w-4 rounded border-2 seat-gold"></span> Gold ₹240</span>
            <span class="flex items-center gap-1"><span class="h-4 w-4 rounded border-2 seat-platinum"></span> Platinum ₹300</span>
        </div>

        <div id="summary" class="mt-6 rounded-xl border border-gray-300 bg-white p-4 hidden">
            <h3 class="text-xl font-bold">Booking Summary</h3>
            <p id="seatsSummary" class="text-sm text-gray-600"></p>
            <p id="showSummary" class="text-sm text-gray-600"></p>
            <p id="totalSummary" class="mt-2 text-lg font-semibold text-green-600"></p>
            <button id="proceed" class="mt-3 bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Proceed to Payment</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        const urlParams = new URLSearchParams(window.location.search);
        const movieId = window.location.pathname.split('/').pop();
        let movie, selectedShowTime = '', selectedSeats = [], bookedSeats = [];

        const prices = { 'A':180, 'B':180, 'C':180, 'D':240, 'E':240, 'F':240, 'G':240, 'H':240, 'I':300, 'J':300 };

        fetch('/api/movies')
        .then(res => res.json())
        .then(movies => {
            movie = movies.find(m => m.id === movieId);
            if (!movie) return;
            document.getElementById('movieTitle').textContent = movie.title;
            const timesDiv = document.getElementById('showTimes');
            movie.showTimes.forEach(time => {
                const btn = document.createElement('button');
                btn.textContent = time;
                btn.dataset.time = time;
                btn.className = 'border border-gray-300 px-3 py-1 rounded text-sm transition-colors';
                btn.onclick = () => selectShowTime(time);
                timesDiv.appendChild(btn);
            });
            selectShowTime(movie.showTimes[0]);
        });

        function selectShowTime(time) {
            selectedShowTime = time;
            selectedSeats = [];
            document.querySelectorAll('#showTimes button').forEach(b => {
                b.className = b.dataset.time === time
                    ? 'bg-red-600 text-white border border-red-600 px-3 py-1 rounded text-sm transition-colors'
                    : 'border border-gray-300 text-gray-700 px-3 py-1 rounded text-sm transition-colors hover:border-red-400';
            });
            fetch(`/api/bookings/${movieId}/${time}`)
            .then(res => res.json())
            .then(seats => {
                bookedSeats = seats;
                renderSeats();
            });
        }

        function renderSeats() {
            const grid = document.getElementById('seatGrid');
            grid.innerHTML = '';
            const rows = ['A','B','C','D','E','F','G','H','I','J'];
            rows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex items-center gap-1 mb-1';
                const label = document.createElement('span');
                label.textContent = row;
                label.className = 'w-6 text-center text-xs font-semibold text-gray-600';
                rowDiv.appendChild(label);
                for (let i = 1; i <= 20; i++) {
                    const seatId = `${row}${i}`; // e.g. A1, B5
                    const btn = document.createElement('button');
                    btn.textContent = i;
                    btn.className = 'h-7 w-7 rounded-t-lg border text-xs font-medium';
                    if (bookedSeats.includes(seatId)) {
                        btn.className += ' seat-booked cursor-not-allowed';
                    } else if (selectedSeats.includes(seatId)) {
                        btn.className += ' seat-selected';
                    } else {
                        btn.className += ' seat-available hover:bg-gray-200';
                        if (['A','B','C'].includes(row)) btn.classList.add('seat-silver');
                        else if (['D','E','F','G','H'].includes(row)) btn.classList.add('seat-gold');
                        else btn.classList.add('seat-platinum');
                    }
                    btn.onclick = () => toggleSeat(seatId);
                    rowDiv.appendChild(btn);
                }
                grid.appendChild(rowDiv);
            });
            updateSummary();
        }

        function toggleSeat(seatId) {
            if (bookedSeats.includes(seatId)) return;
            if (selectedSeats.includes(seatId)) {
                selectedSeats = selectedSeats.filter(s => s !== seatId);//creating new array of selected seats
            } else {
                selectedSeats.push(seatId);
            }
            renderSeats();
        }

        document.getElementById('autoAllocate').onclick = async () => {
            const count = parseInt(document.getElementById('ticketCount').value);
            const res = await fetch('/api/allocate-seats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ numTickets: count, bookedSeats })
            });
            const seats = await res.json();
            selectedSeats = seats;
            renderSeats();
        };

        document.getElementById('reset').onclick = () => {
            selectedSeats = [];
            renderSeats();
        };

        function updateSummary() {
            const summary = document.getElementById('summary');
            if (selectedSeats.length === 0) {
                summary.classList.add('hidden');
                return;
            }
            summary.classList.remove('hidden');
            document.getElementById('seatsSummary').textContent = `Seats: ${selectedSeats.sort().join(', ')}`;
            document.getElementById('showSummary').textContent = `Show: ${selectedShowTime}`;
            const total = selectedSeats.reduce((sum, s) => sum + prices[s[0]], 0);
            document.getElementById('totalSummary').textContent = `Total: ₹${total}`;
        }

        document.getElementById('proceed').onclick = () => {
            const total = selectedSeats.reduce((sum, s) => sum + prices[s[0]], 0);
            localStorage.setItem('booking', JSON.stringify({
                movieId, movieTitle: movie.title, seats: selectedSeats, showTime: selectedShowTime, totalAmount: total
            }));
            window.location.href = '/payment';
        };

        document.getElementById('logout').onclick = () => {
            localStorage.clear();
            window.location.href = '/';
        };
    </script>
</body>
</html>
