<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23dc2626'><path d='M7 4v16l13-8L7 4z'/></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMAX - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #2f0505 0%, #0a0a0a 100%); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.5s ease-out both; }
        .card { background: #0d0d0d; border: 1px solid #2a2a2a; }
        .card:hover { border-color: #dc2626; transition: border-color 0.2s; }
        .divider { width: 1px; background: linear-gradient(to bottom, transparent, #dc2626, transparent); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4 py-10">

    <!-- Header -->
    <div class="mb-10 text-center fade-in">
        <div class="mx-auto mb-3 h-14 w-14 text-red-600">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16l13-8L7 4z" />
            </svg>
        </div>
        <h1 class="text-6xl font-bold tracking-widest text-red-700">CINEMAX</h1>
        <p class="mt-2 text-sm text-gray-500">Your Premium Cinema Experience</p>
    </div>

    <!-- Two Login Blocks -->
    <div class="w-full max-w-3xl flex flex-col md:flex-row gap-6 md:gap-0 fade-in" style="animation-delay:0.15s">

        <!-- User Login -->
        <div class="card flex-1 rounded-xl p-8 md:rounded-r-none">
            <div class="mb-6 text-center">
                <div class="mx-auto mb-2 h-10 w-10 text-red-500">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-white">User Login</h2>
                <p class="text-xs text-gray-500 mt-1">Book & manage your tickets</p>
            </div>
            <form id="userForm" class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Username</label>
                    <input id="uUsername" type="text" placeholder="Enter username"
                        class="w-full bg-black border border-gray-700 text-white rounded-md px-3 py-2 text-sm focus:outline-none focus:border-red-600" required>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Password</label>
                    <input id="uPassword" type="password" placeholder="Enter password"
                        class="w-full bg-black border border-gray-700 text-white rounded-md px-3 py-2 text-sm focus:outline-none focus:border-red-600" required>
                </div>
                <p id="uError" class="text-xs text-red-500 hidden"></p>
                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-md text-sm font-semibold transition-colors">
                    Login as User
                </button>
            </form>
            <p class="mt-5 text-center text-xs text-gray-500">
                Don't have an account?
                <a href="/register" class="text-red-500 underline hover:text-red-400">Register</a>
            </p>
        </div>

        <!-- Vertical Divider (desktop) -->
        <div class="divider hidden md:block mx-0"></div>
        <!-- Horizontal Divider (mobile) -->
        <div class="block md:hidden h-px bg-gradient-to-r from-transparent via-red-700 to-transparent"></div>

        <!-- Authority Login -->
        <div class="card flex-1 rounded-xl p-8 md:rounded-l-none">
            <div class="mb-6 text-center">
                <div class="mx-auto mb-2 h-10 w-10 text-red-500">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-white">Authority Login</h2>
                <p class="text-xs text-gray-500 mt-1">Theater management panel</p>
            </div>
            <form id="authForm" class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Authority Username</label>
                    <input id="aUsername" type="text" placeholder="Enter authority username"
                        class="w-full bg-black border border-gray-700 text-white rounded-md px-3 py-2 text-sm focus:outline-none focus:border-red-600" required>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Authority Password</label>
                    <input id="aPassword" type="password" placeholder="Enter authority password"
                        class="w-full bg-black border border-gray-700 text-white rounded-md px-3 py-2 text-sm focus:outline-none focus:border-red-600" required>
                </div>
                <p id="aError" class="text-xs text-red-500 hidden"></p>
                <button type="submit" class="w-full bg-red-800 hover:bg-red-700 text-white py-2 rounded-md text-sm font-semibold transition-colors">
                    Login as Authority
                </button>
            </form>
            <p class="mt-5 text-center text-xs text-gray-600">Restricted access — theater staff only</p>
        </div>
    </div>

    <script>
        async function doLogin(username, password, errorEl) {
            errorEl.classList.add('hidden');
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user || {}));
                    window.location.href = data.isAuthority ? '/admin' : '/home';
                } else {
                    errorEl.textContent = data.message || 'Invalid credentials';
                    errorEl.classList.remove('hidden');
                }
            } catch {
                errorEl.textContent = 'Login failed. Try again.';
                errorEl.classList.remove('hidden');
            }
        }

        document.getElementById('userForm').addEventListener('submit', e => {
            e.preventDefault();
            doLogin(
                document.getElementById('uUsername').value,
                document.getElementById('uPassword').value,
                document.getElementById('uError')
            );
        });

        document.getElementById('authForm').addEventListener('submit', e => {
            e.preventDefault();
            doLogin(
                document.getElementById('aUsername').value,
                document.getElementById('aPassword').value,
                document.getElementById('aError')
            );
        });
    </script>
</body>
</html>
