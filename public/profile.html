<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23dc2626'><path d='M7 4v16l13-8L7 4z'/></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMAX - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen">
    <nav class="bg-black shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-red-600">CINEMAX</h1>
            <div class="flex gap-4">
                <a href="/home" class="text-red-600">Home</a>
                <a href="/profile" class="text-red-600">Profile</a>
                <button id="logout" class="text-red-600">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto py-8">
        <h1 class="text-3xl font-bold mb-6">My Profile</h1>
        <div id="userInfo" class="bg-white rounded-lg border border-gray-300 p-6 mb-6">
            <!-- User info -->
        </div>
        <h2 class="text-2xl font-bold mb-4">My Bookings</h2>
        <div id="bookings" class="space-y-4">
            <!-- Bookings -->
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';

        const user = JSON.parse(localStorage.getItem('user'));
        document.getElementById('userInfo').innerHTML = `
            <p><strong>Name:</strong> ${user.fullName || '—'}</p>
            <p><strong>Username:</strong> ${user.username || '—'}</p>
            <p><strong>Email:</strong> ${user.email || '—'}</p>
            <p><strong>Phone:</strong> ${user.phone || '—'}</p>
        `;

        Promise.all([
            fetch('/api/bookings/user/' + user.id, { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()),
            fetch('/api/bookings/user/authorised/' + user.id, { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()),
            fetch('/api/bookings/user/cancelled/' + user.id, { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json())
        ]).then(([confirmed, authorised, cancelled]) => {
            const container = document.getElementById('bookings');
            const all = [
                ...confirmed.map(b => ({ ...b, _status: 'confirmed' })),
                ...authorised.map(b => ({ ...b, _status: 'authorised' })),
                ...cancelled.map(b => ({ ...b, _status: 'cancelled' }))
            ].sort((a, b) => new Date(b.bookedAt) - new Date(a.bookedAt));

            if (all.length === 0) { container.innerHTML = '<p class="text-gray-500">No bookings yet.</p>'; return; }

            all.forEach(booking => {
                const div = document.createElement('div');
                div.className = 'bg-white rounded-lg border border-gray-300 p-4';
                const statusColor = booking._status === 'cancelled' ? 'text-red-600' : booking._status === 'authorised' ? 'text-blue-600' : 'text-green-600';
                const statusLabel = booking._status === 'cancelled' ? 'Cancelled' : booking._status === 'authorised' ? 'Authorised ✓' : 'Confirmed';
                div.innerHTML = `
                    <h3 class="font-bold">${booking.movieTitle}</h3>
                    <p class="text-sm text-gray-600">Show: ${booking.showTime}</p>
                    <p class="text-sm text-gray-600">Seats: ${booking.seats.join(', ')}</p>
                    <p class="text-sm text-gray-600">Total: ₹${booking.totalAmount}</p>
                    <p class="text-sm">Status: <span class="font-semibold ${statusColor}">${statusLabel}</span></p>
                    ${booking._status === 'confirmed' ? `<button onclick="cancelBooking('${booking._id}', this)" class="mt-2 border border-red-600 text-red-600 px-3 py-1 rounded text-sm hover:bg-red-50">Cancel</button>` : ''}
                `;
                container.appendChild(div);
            });
        });

        document.getElementById('logout').onclick = () => {
            localStorage.clear();
            window.location.href = '/';
        };

        async function cancelBooking(bookingId, btn) {
            if (!confirm('Cancel this booking?')) return;
            const res = await fetch(`/api/bookings/${bookingId}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ status: 'cancelled' })
            });
            if (res.ok) {
                btn.closest('div').querySelector('p:last-of-type').innerHTML = 'Status: <span class="font-semibold text-red-600">Cancelled</span>';
                btn.remove();
            } else alert('Failed to cancel');
        }
    </script>
</body>
</html>
